<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>atvesk - Nuotraukų galerija</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #121a2b;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --border: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: radial-gradient(circle at top, #111827 0%, var(--bg) 55%);
      color: var(--text);
    }
    .wrap { width: min(1300px, 94vw); margin: 0 auto; padding: 22px 0 46px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      position: sticky; top: 0; z-index: 10; padding: 12px 0;
      backdrop-filter: blur(6px);
      background: linear-gradient(to bottom, rgba(11,18,32,.88), rgba(11,18,32,.58));
    }
    .title { margin: 0; font-size: clamp(22px, 3.2vw, 34px); }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .btn {
      border: 1px solid #334155; color: #dbeafe; text-decoration: none;
      padding: 10px 14px; border-radius: 10px; background: #0f172a;
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .category-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #0f172a;
      padding: 18px;
      cursor: pointer;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      text-align: left;
      color: var(--text);
    }
    .category-card:hover {
      transform: translateY(-4px);
      border-color: #334155;
      box-shadow: 0 10px 25px rgba(0,0,0,.28);
    }
    .category-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .category-sub { color: var(--muted); font-size: 13px; }
    .gallery-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 16px 0 14px;
      flex-wrap: wrap;
    }
    .gallery-title { margin: 0; font-size: clamp(18px, 2.5vw, 28px); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
    }
    .item {
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
      background: var(--card); cursor: zoom-in;
    }
    .item img {
      width: 100%; height: 200px; object-fit: cover; display: block;
      transition: transform .25s ease;
    }
    .item:hover img { transform: scale(1.04); }
    .cap {
      padding: 8px 10px; font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .status {
      border: 1px dashed #334155; border-radius: 12px; color: #cbd5e1;
      padding: 14px; margin-top: 14px;
    }
    .lightbox {
      position: fixed; inset: 0; z-index: 40; display: none;
      background: rgba(2, 6, 23, .92);
      align-items: center; justify-content: center; padding: 16px;
    }
    .lightbox.open { display: flex; }
    .lb-inner { width: min(96vw, 1200px); }
    .lb-head {
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      color: #cbd5e1; margin-bottom: 10px;
    }
    .lb-img-wrap {
      border: 1px solid #334155; border-radius: 14px; overflow: hidden; background: #020617;
      max-height: calc(100vh - 110px);
    }
    .lb-img { width: 100%; max-height: calc(100vh - 110px); object-fit: contain; display: block; }
    .lb-actions { display: flex; gap: 8px; }
    .lb-btn, .lb-close {
      border: 1px solid #334155; color: #e2e8f0; background: #0f172a;
      border-radius: 10px; padding: 8px 12px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">Nuotraukų galerija</h1>
        <p class="subtitle">Pasirinkite skyrių ir peržiūrėkite nuotraukas</p>
      </div>
      <a class="btn" href="index.html">Grįžti į pagrindinį</a>
    </div>

    <div id="categoryRoot"></div>
    <div id="galleryRoot"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lb-inner">
      <div class="lb-head">
        <div id="lbLabel"></div>
        <div class="lb-actions">
          <button class="lb-btn" id="lbPrev" type="button">Atgal</button>
          <button class="lb-btn" id="lbNext" type="button">Pirmyn</button>
          <button class="lb-close" id="lbClose" type="button">Uždaryti</button>
        </div>
      </div>
      <div class="lb-img-wrap">
        <img id="lbImg" class="lb-img" alt="Galerijos nuotrauka" />
      </div>
    </div>
  </div>

  <script>
    (async function () {
      const categoryRoot = document.getElementById('categoryRoot');
      const root = document.getElementById('galleryRoot');
      const lightbox = document.getElementById('lightbox');
      const lbImg = document.getElementById('lbImg');
      const lbLabel = document.getElementById('lbLabel');
      const lbPrev = document.getElementById('lbPrev');
      const lbNext = document.getElementById('lbNext');
      const lbClose = document.getElementById('lbClose');

      const CATEGORIES = [
        { id: 'sumontuoti-kondicionieriai', title: 'Sumontuoti kondicionieriai', folder: 'nuotraukos/sumontavimai/' },
        { id: 'silumos-siurbliai', title: 'Šilumos siurbliai', folder: 'nuotraukos/sumontavimai/' },
        { id: 'saldymo-kambariai', title: 'Šaldymo kambariai', folder: 'nuotraukos/saldymokamera/' },
        { id: 'kondicionieriu-profilaktika', title: 'Kondicionierių profilaktika', folder: 'nuotraukos/profilaktikos/' },
        { id: 'remontas', title: 'Remontas', folder: 'nuotraukos/remontai/' }
      ];

      let allPhotos = [];
      let currentIndex = 0;
      let currentCategory = null;

      function openLightbox(i) {
        currentIndex = i;
        renderLightbox();
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      }

      function renderLightbox() {
        const p = allPhotos[currentIndex];
        lbImg.src = p.src;
        lbLabel.textContent = p.group + ' - ' + (currentIndex + 1) + ' / ' + allPhotos.length;
        lbPrev.style.opacity = currentIndex === 0 ? '0.45' : '1';
        lbNext.style.opacity = currentIndex === allPhotos.length - 1 ? '0.45' : '1';
      }

      const GH_OWNER = 'violentasx';
      const GH_REPO = 'klimato-dievai';
      const GH_BRANCH = 'master';

      async function gautiNuotraukasIsGithubApi(folder) {
        const apiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${folder}?ref=${GH_BRANCH}`;
        const res = await fetch(apiUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error('GitHub API negrąžino nuotraukų: ' + folder);
        const data = await res.json();
        if (!Array.isArray(data)) return [];
        return data
          .filter((f) => f && f.type === 'file' && /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name))
          .map((f) => f.download_url || f.path)
          .filter(Boolean);
      }

      async function gautiNuotraukasIsVietinioAplanko(folder) {
        const res = await fetch(folder, { cache: 'no-store' });
        if (!res.ok) throw new Error('Nepavyko atidaryti aplanko: ' + folder);
        const html = await res.text();
        const matches = [...html.matchAll(/href="([^"]+\.(?:jpg|jpeg|png|webp|gif))"/gi)];
        return matches
          .map((m) => m[1])
          .filter((p) => !p.startsWith('http'))
          .filter((p) => !p.includes('../'))
          .map((p) => folder + p.replace(/^\.\//, ''));
      }

      async function gautiNuotraukasIsKatalogo(folder) {
        // GitHub Pages aplinkoje katalogų "listing" dažniausiai neveikia,
        // todėl pirmiausia bandome per GitHub API.
        try {
          const gh = await gautiNuotraukasIsGithubApi(folder);
          if (gh.length) return gh;
        } catch (_) {}

        // Fallback vietiniam paleidimui (python/http.server ir pan.).
        const local = await gautiNuotraukasIsVietinioAplanko(folder);
        return Array.from(new Set(local));
      }

      function rodytiKategorijas() {
        root.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'category-grid';

        CATEGORIES.forEach((cat) => {
          const card = document.createElement('button');
          card.type = 'button';
          card.className = 'category-card';
          card.innerHTML = '<div class="category-title">' + cat.title + '</div><div class="category-sub">Atidaryti nuotraukas</div>';
          card.addEventListener('click', () => rodytiKategorijosNuotraukas(cat));
          wrap.appendChild(card);
        });

        categoryRoot.innerHTML = '';
        categoryRoot.appendChild(wrap);
      }

      async function rodytiKategorijosNuotraukas(cat) {
        currentCategory = cat;
        categoryRoot.innerHTML = '';
        root.innerHTML = '<div class="status">Kraunamos nuotraukos...</div>';

        try {
          const photos = await gautiNuotraukasIsKatalogo(cat.folder);
          allPhotos = photos.map((src) => ({ src, group: cat.title }));

          if (!allPhotos.length) {
            root.innerHTML = '<div class="status">Šioje kategorijoje nuotraukų dar nėra.</div>';
            return;
          }

          const head = document.createElement('div');
          head.className = 'gallery-head';
          head.innerHTML = '<h2 class="gallery-title">' + cat.title + '</h2>';

          const backBtn = document.createElement('button');
          backBtn.type = 'button';
          backBtn.className = 'lb-btn';
          backBtn.textContent = '← Atgal į skyrius';
          backBtn.addEventListener('click', rodytiKategorijas);
          head.appendChild(backBtn);

          const grid = document.createElement('div');
          grid.className = 'grid';

          allPhotos.forEach((photo, i) => {
            const item = document.createElement('article');
            item.className = 'item';

            const img = document.createElement('img');
            img.src = photo.src;
            img.alt = cat.title;
            img.loading = 'lazy';

            const cap = document.createElement('div');
            cap.className = 'cap';
            cap.textContent = photo.src.split('/').pop();

            item.appendChild(img);
            item.appendChild(cap);
            item.addEventListener('click', () => openLightbox(i));
            grid.appendChild(item);
          });

          root.innerHTML = '';
          root.appendChild(head);
          root.appendChild(grid);
        } catch (err) {
          root.innerHTML = '<div class="status">Nepavyko įkelti kategorijos nuotraukų. Paleiskite puslapį per vietinį serverį.</div>';
        }
      }

      rodytiKategorijas();

      lbClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
      lbPrev.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderLightbox(); } });
      lbNext.addEventListener('click', () => { if (currentIndex < allPhotos.length - 1) { currentIndex++; renderLightbox(); } });
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; renderLightbox(); }
        if (e.key === 'ArrowRight' && currentIndex < allPhotos.length - 1) { currentIndex++; renderLightbox(); }
      });
    })();
  </script>
</body>
</html>
